name: truetrace_app
description: TrueTrace BLE Lost & Found App
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  #Firebase
  firebase_core: ^2.24.0
  firebase_auth: ^4.17.4
  firebase_messaging: ^14.7.10

  # BLE (Scan + Advertise)
  flutter_reactive_ble: ^5.2.0
  flutter_ble_peripheral: ^2.0.0

  # Device info
  device_info_plus: ^10.1.0
  android_id: ^0.4.0+1
  permission_handler: ^11.3.1

  # Battery
  battery_plus: ^4.0.3

  # Geolocation
  geolocator: ^10.1.0

  # MAP (OpenStreetMap)
  flutter_map: ^6.0.0
  latlong2: ^0.9.0

  # Notifications
  flutter_local_notifications: ^17.1.2

  # HTTP
  http: ^1.2.2

  # State management
  provider: ^6.1.2

  # Fonts
  google_fonts: ^6.2.1

  # Background tasks
  # workmanager: ^0.5.2  # Temporarily disabled due to Flutter embedding v2 compatibility
  flutter_background_service: ^5.0.0

  # Feedback
  vibration: ^2.0.0
  audioplayers: ^5.2.1

  # Storage
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
